services:
  postgres:
    image: postgres:17.4
    container_name: ${POSTGRES_CONTAINER}
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - ./data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

    networks:
      - icompras-network

networks:
  icompras-network:
    name: icompras-network